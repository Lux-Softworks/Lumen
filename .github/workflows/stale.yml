name: Stale

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale
  cancel-in-progress: false

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,roadmap,bug,help-wanted
          exempt-pr-labels: pinned,security,wip,blocked
          stale-issue-message: |
            This issue has been inactive for 60 days. It will be closed in 14 days if no further activity occurs. Comment or remove the `stale` label to keep it open.
          close-issue-message: |
            Closing due to inactivity. Reopen if still relevant.
          stale-pr-message: |
            This pull request has been inactive for 30 days. It will be closed in 14 days if no further activity occurs. Push a commit or comment to keep it open.
          close-pr-message: |
            Closing due to inactivity. Reopen when ready to resume.
          operations-per-run: 100
          ascending: true
